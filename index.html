<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Kirim ke WhatsApp Support</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body {
    margin: 0;
    font-family: Arial, sans-serif;
    background: #cfd8d3;
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
}

.card {
    background: white;
    width: 320px;
    padding: 25px;
    border-radius: 25px;
    box-shadow: 0 10px 25px rgba(0,0,0,0.1);
    text-align: center;
}

.title {
    font-size: 18px;
    font-weight: bold;
    margin-bottom: 20px;
    color: #1f4f46;
}

.input-box {
    display: flex;
    align-items: center;
    border: 2px solid #b6c7c1;
    border-radius: 50px;
    padding: 8px 15px;
    margin-bottom: 20px;
}

.input-box span {
    font-size: 20px;
    margin-right: 10px;
}

.input-box input {
    border: none;
    outline: none;
    flex: 1;
    font-size: 16px;
}

.btn {
    width: 100%;
    padding: 15px;
    border: none;
    border-radius: 50px;
    font-size: 16px;
    font-weight: bold;
    cursor: pointer;
    margin-top: 10px;
}

.kirim {
    background: #146356;
    color: white;
}

.refresh {
    background: #6c63ff;
    color: white;
}

.btn:hover {
    opacity: 0.9;
}
</style>
</head>

<body>

<div class="card">
    <div class="title">📱 Nomor telepon (08xx / 628xx)</div>

    <div class="input-box">
        <span>🇮🇩</span>
        <input type="text" id="nomor" placeholder="81234567890 / 0812345678">
    </div>

    <button class="btn kirim" onclick="kirimEmail()">📩 Kirim ke support</button>
    <button class="btn refresh" onclick="refreshPage()">🔄 Refresh</button>
</div>

<script>
function kirimEmail() {
    var nomor = document.getElementById("nomor").value.trim();

    if(nomor === "") {
        alert("Nomor tidak boleh kosong!");
        return;
    }

    var email = "accessibility@support.whatsapp.com";
    var subject = encodeURIComponent("Permintaan terkait nomor WhatsApp");
    var body = encodeURIComponent(
        "Halo WhatsApp Support,\n\n" +
        "Saya ingin mengajukan permintaan terkait nomor berikut:\n" +
        nomor
    );

    window.location.href = "mailto:" + email + "?subject=" + subject + "&body=" + body;
}

function refreshPage() {
    location.reload();
}
</script>
